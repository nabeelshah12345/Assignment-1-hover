<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cities Assignment</title>
</head>
<style>
    * { margin: 0; padding: 0; }

    body { background-color: rgb(136, 207, 252); }

    .Nav {
        background-color: rgb(0, 162, 255);
        color: white;
        padding: 30px;
        display: flex;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bolder;
        font-size: xx-large;
        border: 4px solid black;
        font-style: italic;
    }

    .maincont {
        margin: 45px 60px;
        background-color: #bfe4fb;
        padding: 20px;
        border-radius: 50px;
        min-height: 335px;
    }

    .text {
        background-color: rgb(0, 106, 255);
        color: white;
        border-radius: 15px;
        font-size: x-large;
        font-weight: bold;
        font-family: 'Trebuchet MS', Arial, sans-serif;
        text-align: center;
        margin-bottom: 40px;
        margin-left: 300px;
        margin-right: 300px;
        padding: 10px;
    }

    .labels-row {
        display: flex;
        justify-content: space-evenly;
        margin-bottom: 30px;
    }

    .cities, .enlarge {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: x-large;
        font-weight: bold;
        color: rgb(0, 145, 255);
    }

    .content-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        right: -60px;
    }

    .cities-row {
        display: grid;
        grid-template-columns: 150px 150px;
        gap: 45px;
    }

    .city {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: x-large;
        padding: 20px;
        background-color: rgba(0, 208, 255, 0.852);
        border-radius: 20px;
        cursor: pointer;
        transition: transform 0.3s ease;
        box-shadow: 1px 2px 10px black;
    }

    .city:hover 
    {
         transform: scale(1.2);
     }

    .Cityimg {
        width: 350px;
        height: 240px;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.4);
        border: 4px solid rgb(0, 162, 255);
        flex-shrink: 0;
        position: relative;
        left: -130px;
    }

    .Cityimg img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 0.4s ease;
    }

    .footer {
        background-color: rgb(0, 162, 255);
        color: white;
        padding: 8px;
        font-size: medium;
        font-weight: bold;
        display: flex;
        justify-content: center;
    }
</style>

<body>
    <div class="Nav">Enlarge Cities By Hover</div>

    <div class="maincont">
        <div class="text">Top 4 Cities In Pakistan</div>

        <div class="labels-row">
            <div class="cities">City Names</div>
            <div class="enlarge">City Image</div>
        </div>

        <div class="content-row">

            <div class="cities-row"> 
                <div class="city" id="city1">Gujrat</div>
                <div class="city" id="city2">Islamabad</div>
                <div class="city" id="city3">Lahore</div>
                <div class="city" id="city4">Karachi</div>
            </div>

            <div class="Cityimg">
                <img id="img1" src="Gujrat.jpg"    alt="Gujrat">
                <img id="img2" src="Islamabad.jpg" alt="Islamabad">
                <img id="img3" src="Lahore.jpg"    alt="Lahore">
                <img id="img4" src="Karachi.jpg"   alt="Karachi">
            </div>

        </div>
    </div>

    <div class="footer">&copy; Nabeel Shahid | 2026 | All Rights Reserved</div>

</body>

<script>
    
    const city1 = document.getElementById('city1');
    const city2 = document.getElementById('city2');
    const city3 = document.getElementById('city3');
    const city4 = document.getElementById('city4');

    const img1 = document.getElementById('img1');
    const img2 = document.getElementById('img2');
    const img3 = document.getElementById('img3');
    const img4 = document.getElementById('img4');

   
    function hideAll() {
        img1.style.opacity = '0';
        img2.style.opacity = '0';
        img3.style.opacity = '0';
        img4.style.opacity = '0';
    }

   

    // Gujrat hover hone pe Gujrat ki image dikhe
    city1.addEventListener('mouseover', function() {
        hideAll();
        img1.style.opacity = '1';
    });

    // Islamabad hover hone pe Islamabad ki image dikhe
    city2.addEventListener('mouseover', function() {
        hideAll();
        img2.style.opacity = '1';
    });

    // Lahore hover hone pe Lahore ki image dikhe
    city3.addEventListener('mouseover', function() {
        hideAll();
        img3.style.opacity = '1';
    });

    // Karachi hover hone pe Karachi ki image dikhe
    city4.addEventListener('mouseover', function() {
        hideAll();
        img4.style.opacity = '1';
    });
</script>

</html>
